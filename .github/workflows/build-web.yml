name: Deploy Web Prototype

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install Dependencies
      run: yarn install

    - name: Build Web App
      run: yarn vite build
      env:
        NODE_ENV: production

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: web-prototype
        # المسار اللي إنت لقيته بالظبط (src/dist)
        path: src/dist/
        if-no-files-found: error