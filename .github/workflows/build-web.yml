name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4 # حدثناه لآخر نسخة
        with:
          node-version: '18'
          cache: 'yarn' # بيسرع الـ Build جداً

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Build Web App
        run: npx vite build --base=./
        env:
          NODE_ENV: production
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # المسار الافتراضي لـ Vite هو dist في الـ root
          path: src/dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4