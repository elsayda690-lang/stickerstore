name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # عشان تقدر تشغله يدوي لو حبيت

permissions:
  contents: read
  pages: write
  id-token: write

# عشان لو عملت Push مرتين ورا بعض، يلغي القديم ويشغل الجديد
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install Dependencies
      run: yarn install

    - name: Build Web App
      run: yarn vite build
      env:
        NODE_ENV: production

    # أهم خطوة: رفع الملفات تحت اسم فريد
    - name: Upload Pages Artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: src/dist/

    - name: Deploy to GitHub Pages
      uses: actions/deploy-pages@v4