- name: Build Web App
      run: yarn vite build
      env:
        NODE_ENV: production
        # دول اللي هيخلو رابط سوبابيز يظهر في الكود بدل undefined
        VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

    - name: Upload Pages Artifact
      uses: actions/upload-pages-artifact@v3
      with:
        # اتأكد لو Vite بيطلع الملفات في dist أو src/dist 
        # المعتاد في Vite هو dist فقط
        path: dist/