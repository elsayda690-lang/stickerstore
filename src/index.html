<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Frappe Books Web</title>
    <script>
      // حقن الـ Mock فوراً قبل تحميل أي ملف JS تقيل
      window.ipc = {
          getEnv: async () => ({ isDevelopment: false, platform: 'web', version: '1.0.0' }),
          get: async (key) => (key === 'language' ? 'English' : null),
          invoke: async (channel) => {
              if (channel === 'create-database' || channel === 'setup-instance') return { success: true };
              return {};
          },
          on: () => {},
          send: () => {},
          db: { call: async () => [], bespoke: async () => ({}) }
      };
      window.ipcRenderer = window.ipc;
      window.process = { env: { NODE_ENV: 'production' } };
    </script>
  </head>
  <body>
    <div id="app"></div> <script type="module" src="./main.ts"></script>
  </body>
</html>
